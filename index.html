<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Today</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-size:18vw;
  font-family:sans-serif;
}
</style>
</head>

<body>

<div id="year"></div>
<div id="md"></div>

<script>
const d = new Date();

const y = d.getFullYear();
const m = String(d.getMonth()+1).padStart(2,'0');
const day = String(d.getDate()).padStart(2,'0');

document.getElementById("year").innerText = y;
document.getElementById("md").innerText = m + "/" + day;
</script>

</body>
</html>
