<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Today</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  color:white;

  display:flex;
  flex-direction:column;

  /* 下寄せ */
  justify-content:flex-end;

  align-items:center;

  height:100vh;

  /* 下に少し余白 */
  padding-bottom:10vh;

  font-size:38vw;
  font-family:sans-serif;
}
</style>
</head>

<body>

<div id="year"></div>
<div id="md"></div>

<script>

function updateDate(){

  const d = new Date();

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');

  document.getElementById("year").innerText = y;
  document.getElementById("md").innerText = m + "/" + day;

  const weekday = d.getDay();

  const colors = [
    "#e60026",
    "#000000",
    "#ff7f00",
    "#00bfff",
    "#228b22",
    "#d4af37",
    "#003f8c"
  ];

  document.body.style.backgroundColor = colors[weekday];
}

updateDate();

setInterval(updateDate, 60000);

document.body.addEventListener("click", updateDate);

</script>

</body>
</html>
