<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Color Test</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  display:flex;
  flex-direction:column;

  /* 下寄せ */
  justify-content:flex-end;

  align-items:center;
  height:100vh;

  /* 下に少し余白 */
  padding-bottom:10vh;

  font-size:38vw;
  font-family:sans-serif;
}
</style>
</head>

<body>

<div id="year">2026</div>
<div id="md">03/29</div>

<script>

const colors = [
  "#e60026", // 日
  "#000000", // 月
  "#ff7f00", // 火
  "#00bfff", // 水
  "#228b22", // 木
  "#d4af37", // 金
  "#003f8c"  // 土
];

let index = 0;

function changeColor(){

  document.body.style.backgroundColor = colors[index];

  index++;
  if(index >= colors.length){
    index = 0;
  }
}

/* 初期 */
changeColor();

/* タップで変更 */
document.body.addEventListener("click", changeColor);

</script>

</body>
</html>
